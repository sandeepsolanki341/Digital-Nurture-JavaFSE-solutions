<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display & Visibility</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="mb-3">Responsive Display Utilities</h1>
    <div class="bg-primary text-white p-3 d-none d-md-block">Visible on md and up only (d-none d-md-block)</div>
    <div class="bg-success text-white p-3 d-block d-md-none">Visible on small screens only (d-block d-md-none)</div>
    <div class="bg-warning p-3 mt-3 d-inline">d-inline</div>
    <div class="bg-info p-3 mt-3 d-inline">d-inline next to it</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
