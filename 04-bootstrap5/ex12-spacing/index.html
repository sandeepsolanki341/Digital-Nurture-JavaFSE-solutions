<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spacing Utilities</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="mb-4">Spacing (margin & padding)</h1>
    <div class="bg-primary text-white p-2 mb-2">p-2 padding, mb-2 margin-bottom</div>
    <div class="bg-success text-white p-4 mb-3">p-4 padding, mb-3 margin-bottom</div>
    <div class="bg-warning px-5 py-1 mt-4">px-5 horizontal padding, py-1 vertical, mt-4 margin-top</div>
    <div class="bg-info mx-auto mt-3" style="width:200px">mx-auto centered block</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
