<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Column Layouts</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="mb-3">Sidebar + Content</h1>
    <div class="container">
        <div class="row">
            <aside class="col-md-3 bg-light p-3 border">Sidebar (col-md-3)</aside>
            <main class="col-md-9 p-3">Content area (col-md-9)</main>
        </div>
        <h2 class="mt-4">Four Equal Columns</h2>
        <div class="row text-center">
            <div class="col-sm-3 bg-info p-3 border">1</div>
            <div class="col-sm-3 bg-info p-3 border">2</div>
            <div class="col-sm-3 bg-info p-3 border">3</div>
            <div class="col-sm-3 bg-info p-3 border">4</div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
