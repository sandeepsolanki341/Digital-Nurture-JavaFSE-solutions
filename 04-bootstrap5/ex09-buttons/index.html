<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buttons</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="mb-3">Button Variations</h1>
    <div class="mb-3">
        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-secondary">Secondary</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-outline-primary">Outline</button>
    </div>
    <div class="mb-3">
        <button class="btn btn-primary btn-lg">Large</button>
        <button class="btn btn-primary">Default</button>
        <button class="btn btn-primary btn-sm">Small</button>
    </div>
    <div class="btn-group">
        <button class="btn btn-dark">Left</button>
        <button class="btn btn-dark">Middle</button>
        <button class="btn btn-dark">Right</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
