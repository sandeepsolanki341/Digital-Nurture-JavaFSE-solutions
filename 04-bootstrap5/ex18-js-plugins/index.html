<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Plugins</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="mb-3">Interactive Components</h1>

    <!-- Modal -->
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#regModal">
        Open Registration Modal
    </button>
    <div class="modal fade" id="regModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Register for Tech Meetup</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input class="form-control" placeholder="Your name">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Accordion (FAQ) -->
    <h2 class="mt-4">FAQ</h2>
    <div class="accordion" id="faq">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#q1">
                    How do I register?
                </button>
            </h2>
            <div id="q1" class="accordion-collapse collapse show" data-bs-parent="#faq">
                <div class="accordion-body">Click any event's Register button.</div>
            </div>
        </div>
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#q2">
                    Is there a fee?
                </button>
            </h2>
            <div id="q2" class="accordion-collapse collapse" data-bs-parent="#faq">
                <div class="accordion-body">Workshops are free; conferences may charge.</div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
