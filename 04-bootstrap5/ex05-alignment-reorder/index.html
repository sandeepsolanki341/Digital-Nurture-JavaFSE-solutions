<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alignment & Reorder</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1>Centered Content</h1>
    <div class="row justify-content-center align-items-center border" style="height:150px">
        <div class="col-4 bg-primary text-white text-center p-2">Centered both axes</div>
    </div>

    <h2 class="mt-4">Reorder on md+</h2>
    <div class="row">
        <div class="col-md-6 order-md-2 bg-success text-white p-3">First in markup, second on desktop</div>
        <div class="col-md-6 order-md-1 bg-warning p-3">Second in markup, first on desktop</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
