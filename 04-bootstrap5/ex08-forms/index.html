<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootstrap Forms</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="mb-3">Event Registration</h1>
    <form class="row g-3" style="max-width:600px">
        <div class="col-md-6">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" placeholder="Your name">
        </div>
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="you@example.com">
        </div>
        <div class="col-md-6">
            <label class="form-label">Event Type</label>
            <select class="form-select">
                <option>Workshop</option><option>Conference</option><option>Meetup</option>
            </select>
        </div>
        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="agree">
                <label class="form-check-label" for="agree">I agree to the terms</label>
            </div>
        </div>
        <div class="col-12"><button type="submit" class="btn btn-primary">Register</button></div>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
