<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootstrap Icons</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="p-4">
    <h1 class="mb-3">Icons in the UI</h1>
    <button class="btn btn-primary"><i class="bi bi-calendar-event"></i> Add Event</button>
    <button class="btn btn-success"><i class="bi bi-check-circle"></i> Register</button>
    <button class="btn btn-danger"><i class="bi bi-trash"></i> Delete</button>
    <p class="mt-3 fs-4">
        <i class="bi bi-geo-alt-fill text-danger"></i> Location
        <i class="bi bi-people-fill text-primary"></i> Attendees
        <i class="bi bi-star-fill text-warning"></i> Featured
    </p>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
