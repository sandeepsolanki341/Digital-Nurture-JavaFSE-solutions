<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cards</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="mb-3">Event Cards</h1>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card h-100">
                <img src="https://placehold.co/400x200?text=Meetup" class="card-img-top" alt="Meetup">
                <div class="card-body">
                    <h5 class="card-title">Tech Meetup</h5>
                    <p class="card-text">June 10, 2025 — New York</p>
                    <a href="#" class="btn btn-primary">Register</a>
                </div>
                <div class="card-footer text-muted">20 seats left</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <img src="https://placehold.co/400x200?text=Bootcamp" class="card-img-top" alt="Bootcamp">
                <div class="card-body">
                    <h5 class="card-title">Frontend Bootcamp</h5>
                    <p class="card-text">July 1, 2025 — Los Angeles</p>
                    <a href="#" class="btn btn-primary">Register</a>
                </div>
                <div class="card-footer text-muted">5 seats left</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <img src="https://placehold.co/400x200?text=Concert" class="card-img-top" alt="Concert">
                <div class="card-body">
                    <h5 class="card-title">Summer Concert</h5>
                    <p class="card-text">August 5, 2025 — Chicago</p>
                    <a href="#" class="btn btn-primary">Register</a>
                </div>
                <div class="card-footer text-muted">Sold out</div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
