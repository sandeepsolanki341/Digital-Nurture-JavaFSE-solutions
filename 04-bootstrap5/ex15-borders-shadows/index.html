<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borders & Shadows</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="mb-4">Borders, Rounding & Shadows</h1>
    <div class="d-flex gap-4 flex-wrap">
        <div class="border p-4">border</div>
        <div class="border border-primary border-3 p-4">thick primary border</div>
        <div class="border rounded-circle p-4 bg-light">rounded-circle</div>
        <div class="p-4 shadow-sm bg-white">shadow-sm</div>
        <div class="p-4 shadow bg-white">shadow</div>
        <div class="p-4 shadow-lg bg-white rounded">shadow-lg + rounded</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
