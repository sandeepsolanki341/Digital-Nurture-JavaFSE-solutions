<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Structure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <h1>Bootstrap Bundle Loaded</h1>
    <p>The downloaded Bootstrap dist folder contains:</p>
    <ul>
        <li><code>css/</code> — compiled stylesheets (bootstrap.min.css)</li>
        <li><code>js/</code> — plugins; <code>bootstrap.bundle.min.js</code> includes Popper</li>
        <li>icons (separate package) — SVG/webfont icon set</li>
    </ul>
    <button class="btn btn-primary" data-bs-toggle="tooltip" title="Bundle includes Popper!">
        Hover me (tooltip needs the bundle JS)
    </button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Tooltips require JS init — proves bundle.min.js is wired up
        document.querySelectorAll('[data-bs-toggle="tooltip"]')
            .forEach(el => new bootstrap.Tooltip(el));
    </script>
</body>
</html>
