<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typography</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="display-4">Community Bulletin</h1>
    <p class="lead">A lead paragraph introducing the portal.</p>
    <p class="text-muted">Muted secondary text.</p>
    <p class="fw-bold text-uppercase">Bold uppercase notice</p>
    <blockquote class="blockquote"><p>Great events, great community.</p></blockquote>
    <p class="text-center text-primary fst-italic">Centered italic primary text</p>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
