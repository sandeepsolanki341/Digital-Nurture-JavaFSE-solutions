<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Positioning</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="mb-3">Position Utilities</h1>
    <div class="position-relative border bg-light" style="height:160px">
        <span class="position-absolute top-0 start-0 badge text-bg-primary">top-start</span>
        <span class="position-absolute top-0 end-0 badge text-bg-success">top-end</span>
        <span class="position-absolute top-50 start-50 translate-middle badge text-bg-danger">centered</span>
        <span class="position-absolute bottom-0 end-0 badge text-bg-dark">bottom-end</span>
    </div>
    <button class="btn btn-primary position-relative mt-4">
        Inbox <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill text-bg-danger">9+</span>
    </button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
