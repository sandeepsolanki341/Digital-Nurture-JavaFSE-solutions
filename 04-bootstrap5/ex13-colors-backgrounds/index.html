<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colors & Backgrounds</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <h1 class="mb-3">Contextual Colors</h1>
    <p class="text-primary">text-primary</p>
    <p class="text-danger">text-danger</p>
    <p class="text-success">text-success</p>
    <div class="bg-primary text-white p-2 mb-2">bg-primary</div>
    <div class="bg-dark text-white p-2 mb-2">bg-dark</div>
    <div class="bg-light text-dark p-2 mb-2 border">bg-light</div>
    <div class="alert alert-warning">alert-warning contextual block</div>
    <span class="badge text-bg-success">Success badge</span>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
