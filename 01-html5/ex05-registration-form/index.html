<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; }
        label { display: block; margin: 12px 0 4px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { margin-top: 16px; padding: 10px 20px; background: #1d4e89; color: #fff; border: 0; border-radius: 4px; cursor: pointer; }
        #confirmation { margin-top: 16px; color: green; font-weight: 600; }
    </style>
</head>
<body>
    <h1>Register for an Event</h1>
    <form id="regForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your name" required autofocus>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>

        <label for="date">Preferred Date</label>
        <input type="date" id="date" required>

        <label for="eventType">Event Type</label>
        <select id="eventType" required>
            <option value="">-- choose --</option>
            <option>Workshop</option>
            <option>Conference</option>
            <option>Meetup</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" rows="3" placeholder="Anything we should know?"></textarea>

        <button type="submit">Register</button>
    </form>
    <output id="confirmation"></output>

    <script>
        document.getElementById('regForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            document.getElementById('confirmation').textContent =
                `Thanks ${name}, your registration is confirmed!`;
        });
    </script>
</body>
</html>
