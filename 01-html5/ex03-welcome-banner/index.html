<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner { background: #1d4e89; color: #fff; padding: 20px; border-radius: 6px; }
        .highlight { background: #ffe27a; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        <h1>Welcome back, Resident!</h1>
        <p>Special offer today:
            <span style="color: red; font-weight: bold;">Free entry to all workshops</span>
        </p>
    </div>
    <p>Don't miss our <span class="highlight">featured event</span> this weekend.</p>
</body>
</html>
