<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Find Nearby Events</title>
</head>
<body>
    <h1>Find Nearby Events</h1>
    <button id="findBtn">Find Nearby Events</button>
    <p id="output"></p>

    <script>
        document.getElementById('findBtn').onclick = () => {
            const out = document.getElementById('output');
            if (!navigator.geolocation) { out.textContent = 'Geolocation not supported.'; return; }

            out.textContent = 'Locating…';
            navigator.geolocation.getCurrentPosition(
                pos => out.textContent =
                    `Lat: ${pos.coords.latitude.toFixed(4)}, Lng: ${pos.coords.longitude.toFixed(4)}`,
                err => {
                    const msgs = {1:'Permission denied', 2:'Position unavailable', 3:'Request timed out'};
                    out.textContent = 'Error: ' + (msgs[err.code] || err.message);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        };
    </script>
</body>
</html>
