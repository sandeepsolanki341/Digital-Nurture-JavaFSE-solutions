<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Gallery</title>
    <style>
        .event-img { width: 180px; height: 120px; object-fit: cover;
                     border: 3px solid #1d4e89; border-radius: 4px; }
        table { border-spacing: 16px; }
        figcaption { text-align: center; font-size: 0.9rem; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>Past Community Events</h1>
    <table>
        <tr>
            <td><figure><img class="event-img" src="https://placehold.co/180x120?text=Meetup" alt="Tech Meetup" title="Tech Meetup"><figcaption>Tech Meetup 2024</figcaption></figure></td>
            <td><figure><img class="event-img" src="https://placehold.co/180x120?text=Bootcamp" alt="Bootcamp" title="Bootcamp"><figcaption>Frontend Bootcamp</figcaption></figure></td>
            <td><figure><img class="event-img" src="https://placehold.co/180x120?text=Concert" alt="Concert" title="Concert"><figcaption>Summer Concert</figcaption></figure></td>
        </tr>
        <tr>
            <td><figure><img class="event-img" src="https://placehold.co/180x120?text=Workshop" alt="Workshop" title="Workshop"><figcaption>Baking Workshop</figcaption></figure></td>
            <td><figure><img class="event-img" src="https://placehold.co/180x120?text=Cleanup" alt="Cleanup" title="Cleanup"><figcaption>Park Cleanup</figcaption></figure></td>
            <td><figure><img class="event-img" src="https://placehold.co/180x120?text=Fair" alt="Job Fair" title="Job Fair"><figcaption>Community Job Fair</figcaption></figure></td>
        </tr>
    </table>
</body>
</html>
