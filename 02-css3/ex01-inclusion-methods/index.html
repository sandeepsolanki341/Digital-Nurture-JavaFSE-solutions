<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Inclusion Methods</title>
    <!-- internal style: body background -->
    <style>
        body { background: #f4f6f8; font-family: sans-serif; }
    </style>
    <!-- external stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- inline style: red heading -->
    <h1 style="color: red;">Community Event Portal</h1>
    <p class="intro">This heading is red via <em>inline</em> style,
       the background is set by an <em>internal</em> &lt;style&gt; tag,
       and this paragraph is styled by an <em>external</em> stylesheet.</p>
</body>
</html>
